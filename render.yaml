services:
  - type: web
    name: evotech-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ai_engineering_portfolio
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
